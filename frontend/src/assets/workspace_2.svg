


<svg width="869" height="1141" viewBox="0 0 869 1141" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes leafSway {
	0%, 100% {
		transform: translateY(0) rotate(1deg);
	}
	50% {
		transform: translateY(-3px) rotate(-5deg);
	}
}

#leaf1,
#leaf2,
#leaf3,
#leaf4 {
	transform-box: fill-box;
	transform-origin: center bottom;
	animation: leafSway 3.8s ease-in-out infinite;
}

#leaf2 {
	animation-delay: 0.15s;
}

@keyframes smokeRise {
	0% {
		transform: translateY(0) translateX(0) scale(0.92);
		opacity: 0;
	}
	20% {
		opacity: 0.95;
	}
	70% {
		opacity: 0.6;
	}
	100% {
		transform: translateY(-64px) translateX(var(--smoke-shift, 0px)) scale(1.24);
		opacity: 0;
	}
}

#smoke1,
#smoke2,
#smoke3 {
	transform-box: fill-box;
	transform-origin: center bottom;
	animation: smokeRise 2.9s ease-in-out infinite;
}

#smoke2 {
	--smoke-shift: 8px;
	animation-delay: 0.8s;
}

#smoke3 {
	--smoke-shift: -7px;
	animation-delay: 1.6s;
}

#leaf3 {
	animation-delay: 0.3s;
}

#leaf4 {
	animation-delay: 0.45s;
}
</style>
